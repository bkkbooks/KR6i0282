front:
  text: 不必定入定入印經翻譯之記出世智道亦名為印此經印義或然不然私情有指未許官用何者私情今且當向發心修行證會名入所乘強劣有定不定聖説定入説不定入言義如是決定名印説如是故名如是經其門要密通必有寄魏尚書令儀同高公深知佛法出自中天翻為此典萬未有一採挾集人在第更譯沙門曇林瞿曇流支興和四年歲次降婁月建在戌朔次甲子壬午之日出此如左九千一百九十三字
